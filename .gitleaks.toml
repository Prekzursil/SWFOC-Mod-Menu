# gitleaks configuration for the lean secrets gate (charter gate 5).
# Pinned tool: gitleaks 8.30.1. The gate runs via pre-commit over the working
# tree (and standalone in CI) and must report 0 findings.
#
# Extends the upstream default ruleset. The working tree currently has 0
# findings (baseline scan 2026-06-16), so this file carries only path allowlists
# for vendored / generated / binary trees that are not our source and would only
# ever produce upstream-example false positives. Add a new match/regex allowlist
# entry here ONLY for a genuine, greppable test fixture (never a real secret),
# with a dated reason.
title = "swfoc-mod-menu lean secrets gate"

[extend]
useDefault = true

[allowlist]
description = "Vendored deps, build/test output, and binary game assets (not real secrets)."

paths = [
  '''(^|/)node_modules/''',
  '''(^|/)\.venv/''',
  '''(^|/)venv/''',
  '''(^|/)dist/''',
  '''(^|/)build/''',
  '''(^|/)out/''',
  '''(^|/)bin/''',
  '''(^|/)obj/''',
  '''(^|/)vendor/''',
  '''(^|/)packages/''',
  '''(^|/)TestResults/''',
  '''(^|/)\.git/''',
  '''.*\.egg-info/''',
  # Binary game / reverse-engineering assets: Cheat Engine table and any packed
  # game data carry high-entropy bytes that are not credentials.
  '''.*\.CT$''',
  '''.*\.(meg|dat|bin|dll|exe|pdb|so)$''',
  # Vendored third-party RE editor dependencies reproduced verbatim for
  # provenance (2026-06-27 incorporation). These carry only upstream-example /
  # high-entropy library constants, never our credentials:
  #   - Dear ImGui (swfoc_overlay/imgui): generic-api-key FP on a base64-looking
  #     lookup-table literal in imgui.cpp.
  #   - MinHook (swfoc_lua_bridge/minhook): vendored hooking library.
  '''(^|/)swfoc_overlay/imgui/''',
  '''(^|/)swfoc_lua_bridge/minhook/''',
  # Incorporated data tree (2026-06-28):
  #   - knowledge-base: reverse-engineering notes + machine-generated decompile/
  #     data JSON + a SQLite call-graph index.
  # Baseline gitleaks scan 2026-06-28 found 0 leaks; allowlisted so future
  # high-entropy decompile/data bytes (hex RVAs, base64-looking literals) cannot
  # add secrets-noise. Not first-party source.
  '''(^|/)knowledge-base/''',
]
