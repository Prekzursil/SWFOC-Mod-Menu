[pytest]
# Python test suite for the auxiliary RE / quality tooling shipped in this repo
# (scripts/ and tools/). The lean quality gate's coverage lane keys on a pytest
# config file being present and runs `pytest --cov --cov-branch --cov-fail-under=100`.
# Coverage source/omit selection lives in .coveragerc.
testpaths = tests/python
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -q
