name: Coverage 100

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  coverage-100:
    name: Coverage 100 Gate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20'
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '8.0.x'

      - name: Collect deterministic coverage
        shell: pwsh
        run: |
          pwsh -ExecutionPolicy Bypass -File ./tools/quality/collect-dotnet-coverage.ps1 -Configuration Release -DeterministicOnly

      - name: Resolve coverage report path
        shell: pwsh
        run: |
          $candidates = @(
            (Join-Path (Get-Location) 'TestResults/coverage/cobertura.xml'),
            (Join-Path (Get-Location) 'tests/SwfocTrainer.Tests/TestResults/coverage.cobertura.xml'),
            (Join-Path (Get-Location) 'TestResults/coverage.cobertura.xml')
          )
          $resolved = $candidates | Where-Object { Test-Path -Path $_ } | Select-Object -First 1
          if (-not $resolved) {
            throw "Coverage report not found. Checked: $($candidates -join '; ')"
          }

          Write-Host "Using coverage report: $resolved"
          "COVERAGE_REPORT_FILE=$resolved" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Enforce 100% coverage
        shell: pwsh
        run: |
          python scripts/quality/assert_coverage_100.py --xml "dotnet=${{ env.COVERAGE_REPORT_FILE }}" --out-json "coverage-100/coverage.json" --out-md "coverage-100/coverage.md"

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-100
          path: |
            coverage-100
            TestResults/coverage
            tests/SwfocTrainer.Tests/TestResults
