name: Coverage 100

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  coverage-100:
    name: Coverage 100 Gate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Collect deterministic coverage
        shell: pwsh
        run: |
          pwsh -ExecutionPolicy Bypass -File ./tools/quality/collect-dotnet-coverage.ps1 -Configuration Release -DeterministicOnly

      - name: Resolve coverage report path
        shell: pwsh
        run: |
          $candidates = @(
            (Join-Path (Get-Location) 'TestResults/coverage/cobertura.xml'),
            (Join-Path (Get-Location) 'tests/SwfocTrainer.Tests/TestResults/coverage.cobertura.xml'),
            (Join-Path (Get-Location) 'TestResults/coverage.cobertura.xml')
          )
          $resolved = $candidates | Where-Object { Test-Path -Path $_ } | Select-Object -First 1
          if (-not $resolved) {
            throw "Coverage report not found. Checked: $($candidates -join '; ')"
          }

          Write-Host "Using coverage report: $resolved"
          "COVERAGE_REPORT_FILE=$resolved" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Enforce 100% coverage
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          python3 scripts/quality/assert_coverage_100.py \
            --xml "dotnet=${{ env.COVERAGE_REPORT_FILE }}" \
            --out-json "coverage-100/coverage.json" \
            --out-md "coverage-100/coverage.md"

      - name: Mark PR mode (coverage evidence only)
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          New-Item -ItemType Directory -Path coverage-100 -Force | Out-Null
          @'
          {
            "status": "pass",
            "mode": "pull_request_evidence_only",
            "note": "100/100 hard gate enforced on protected branch pushes."
          }
          '@ | Out-File -FilePath coverage-100/coverage.json -Encoding utf8
          @'
          # Coverage 100 Gate

          - Status: `pass`
          - Mode: `pull_request_evidence_only`
          - Note: `100/100` hard gate is enforced on protected branch pushes.
          '@ | Out-File -FilePath coverage-100/coverage.md -Encoding utf8

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-100
          path: |
            coverage-100
            TestResults/coverage
            tests/SwfocTrainer.Tests/TestResults
