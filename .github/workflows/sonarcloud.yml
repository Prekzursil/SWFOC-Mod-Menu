name: sonarcloud

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sonarcloud:
    runs-on: windows-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install SonarScanner
        shell: pwsh
        run: |
          dotnet tool install --global dotnet-sonarscanner
          $toolsPath = Join-Path $env:USERPROFILE ".dotnet\tools"
          echo $toolsPath | Out-File -Append -Encoding utf8 $env:GITHUB_PATH

      - name: Restore
        run: dotnet restore SwfocTrainer.sln

      - name: Sonar Begin
        shell: pwsh
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BRANCH: ${{ github.head_ref }}
          PR_BASE: ${{ github.base_ref }}
        run: |
          $sonarArgs = @(
            "begin",
            "/k:Prekzursil_SWFOC-Mod-Menu",
            "/o:prekzursil",
            "/d:sonar.token=$env:SONAR_TOKEN",
            "/d:sonar.host.url=https://sonarcloud.io",
            "/d:sonar.cs.opencover.reportPaths=TestResults/coverage/opencover.xml"
          )
          if ($env:EVENT_NAME -eq "pull_request" -and $env:PR_NUMBER) {
            $sonarArgs += "/d:sonar.pullrequest.key=$env:PR_NUMBER"
            $sonarArgs += "/d:sonar.pullrequest.branch=$env:PR_BRANCH"
            $sonarArgs += "/d:sonar.pullrequest.base=$env:PR_BASE"
          }
          dotnet-sonarscanner @sonarArgs

      - name: Build
        run: dotnet build SwfocTrainer.sln -c Release --no-restore

      - name: Test with coverage
        shell: pwsh
        run: |
          dotnet test tests/SwfocTrainer.Tests/SwfocTrainer.Tests.csproj `
            -c Release --no-build `
            --filter "FullyQualifiedName!~SwfocTrainer.Tests.Profiles.Live&FullyQualifiedName!~RuntimeAttachSmokeTests" `
            -p:CollectCoverage=true `
            -p:CoverletOutputFormat=opencover `
            '-p:CoverletOutput=TestResults/coverage/opencover' `
            '-p:ExcludeByFile=**/obj/**%2c**/*.g.cs%2c**/*.g.i.cs'

      - name: Sonar End
        shell: pwsh
        run: |
          dotnet-sonarscanner end /d:sonar.token="$env:SONAR_TOKEN"
