name: Codacy Zero

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  codacy-zero:
    name: Codacy Zero
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Skip repository backlog gate on PR (Codacy PR gate remains required)
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          mkdir -p codacy-zero
          cat > codacy-zero/codacy.md <<'MD'
          # Codacy Zero Gate

          - Status: `pass`
          - Mode: `pull_request_delta_only`
          - Note: Repository-wide backlog gate is enforced on protected branch pushes; PR quality is enforced by `Codacy Static Code Analysis`.
          MD
          cat > codacy-zero/codacy.json <<'JSON'
          {
            "status": "pass",
            "mode": "pull_request_delta_only",
            "note": "Repository-wide backlog gate is enforced on protected branch pushes."
          }
          JSON
      - name: Assert Codacy zero-open gate
        if: ${{ github.event_name != 'pull_request' }}
        env:
          CODACY_API_TOKEN: ${{ secrets.CODACY_API_TOKEN }}
        run: |
          python3 scripts/quality/check_codacy_zero.py \
            --owner "${GITHUB_REPOSITORY_OWNER}" \
            --repo "${GITHUB_REPOSITORY#*/}" \
            --out-json "codacy-zero/codacy.json" \
            --out-md "codacy-zero/codacy.md"
      - name: Upload Codacy artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codacy-zero
          path: codacy-zero
