name: Chromatic Playwright

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: chromatic-playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  chromatic:
    name: Chromatic Playwright
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/visual-chromatic
    env:
      CHROMATIC_ARCHIVE_LOCATION: test-results
      CHROMATIC_PR_ORIGIN: ${{ (github.actor == 'dependabot[bot]') || (github.event.pull_request.user.login == 'dependabot[bot]') }}
      HAS_CHROMATIC_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN != '' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: tools/visual-chromatic/package-lock.json

      - name: Fail when Chromatic token is missing for a maintained branch
        if: ${{ env.HAS_CHROMATIC_TOKEN != 'true' && env.CHROMATIC_PR_ORIGIN != 'true' }}
        run: |
          echo "CHROMATIC_PROJECT_TOKEN is not configured for this repository."
          exit 1

      - name: Install dependencies
        if: ${{ env.HAS_CHROMATIC_TOKEN == 'true' }}
        run: npm ci --ignore-scripts && npm rebuild

      - name: Install Playwright browser
        if: ${{ env.HAS_CHROMATIC_TOKEN == 'true' }}
        run: npx playwright install --with-deps chromium

      - name: Generate Playwright archives
        if: ${{ env.HAS_CHROMATIC_TOKEN == 'true' }}
        run: npm run e2e:chromatic

      - name: Upload to Chromatic (dependency/tooling auto-accept)
        if: ${{ env.HAS_CHROMATIC_TOKEN == 'true' && env.CHROMATIC_PR_ORIGIN == 'true' }}
        uses: chromaui/action@eea1606238fd97a70b5af723d103953d1f40967b # v15.3.1
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          playwright: true
          workingDir: tools/visual-chromatic
          autoAcceptChanges: true
        env:
          CHROMATIC_ARCHIVE_LOCATION: test-results

      - name: Upload to Chromatic
        if: ${{ env.HAS_CHROMATIC_TOKEN == 'true' && env.CHROMATIC_PR_ORIGIN != 'true' }}
        uses: chromaui/action@eea1606238fd97a70b5af723d103953d1f40967b # v15.3.1
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          playwright: true
          workingDir: tools/visual-chromatic
        env:
          CHROMATIC_ARCHIVE_LOCATION: test-results

      - name: Note skipped Chromatic run
        if: ${{ env.HAS_CHROMATIC_TOKEN != 'true' && env.CHROMATIC_PR_ORIGIN == 'true' }}
        run: echo "Chromatic Playwright was skipped because CHROMATIC_PROJECT_TOKEN is unavailable in this Dependabot context."
