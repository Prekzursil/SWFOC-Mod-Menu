name: Sonar Zero

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sonar-zero:
    name: Sonar Zero
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Skip repository backlog gate on PR (SonarCloud PR gate remains required)
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          mkdir -p sonar-zero
          cat > sonar-zero/sonar.md <<'MD'
          # Sonar Zero Gate

          - Status: `pass`
          - Mode: `pull_request_delta_only`
          - Note: Repository backlog is enforced on protected branch pushes; PR quality is enforced by `SonarCloud Code Analysis`.
          MD
          cat > sonar-zero/sonar.json <<'JSON'
          {
            "status": "pass",
            "mode": "pull_request_delta_only",
            "note": "Repository backlog is enforced on protected branch pushes."
          }
          JSON
      - name: Assert Sonar zero-open gate
        if: ${{ github.event_name != 'pull_request' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          args=(
            --project-key "Prekzursil_SWFOC-Mod-Menu"
            --out-json "sonar-zero/sonar.json"
            --out-md "sonar-zero/sonar.md"
          )
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            args+=(--pull-request "${{ github.event.pull_request.number }}")
          else
            args+=(--branch "${{ github.ref_name }}")
          fi
          python3 scripts/quality/check_sonar_zero.py "${args[@]}"
      - name: Upload Sonar artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonar-zero
          path: sonar-zero
