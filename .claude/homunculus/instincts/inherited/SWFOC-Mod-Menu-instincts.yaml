1. Identify failing or misconfigured CI pipeline (coverage, secrets, external tools).
2. Update relevant .github/workflows/*.yml files to fix parameters, secrets, or steps.
3. Upgrade or patch dependencies in test or tool subprojects if required.
4. Commit changes with descriptive message referencing the specific CI issue.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: .github/workflows/*.yml, tests/**/Tests.csproj, tools/**/package.json

